name: Deploy

# Only deploy when code is merged/pushed to main.
# Pull requests run CI only — they never deploy.
on:
  push:
    branches:
      - main

# These permissions are required for GitHub's OIDC token exchange with AWS.
# id-token: write lets the workflow request a short-lived AWS token.
# contents: read lets it check out the repo.
permissions:
  id-token: write
  contents: read

jobs:
  # Run CI checks first — never deploy broken code
  test:
    name: Build & Test
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test  # only runs if CI passes

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      # OIDC authentication — no stored AWS credentials.
      # GitHub exchanges a signed JWT for a short-lived AWS token scoped to our role.
      # The role's trust policy (in iam.tf) only allows our specific repo.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Sync built files to S3. --delete removes files that no longer exist locally
      # so the bucket always mirrors the dist/ folder exactly.
      - name: Deploy to S3
        run: >
          aws s3 sync site/dist/ s3://${{ secrets.S3_BUCKET_NAME }}
          --delete
          --cache-control "public, max-age=3600"

      # Tell CloudFront to clear its cache so users get the new files immediately.
      # Without this, cached content can serve for up to 24 hours after a deploy.
      - name: Invalidate CloudFront cache
        run: >
          aws cloudfront create-invalidation
          --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          --paths "/*"
